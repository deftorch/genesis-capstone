<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@mojs/core"></script>
</head>
<body>
  <div id="result"></div>
  <script>
    try {
      if (typeof e === 'function') {
        const res = e();
        document.getElementById('result').innerText = "e() returned: " + Object.keys(res).join(', ');
      } else {
        document.getElementById('result').innerText = "e is not a function: " + typeof e;
      }
    } catch(err) {
      document.getElementById('result').innerText = "Error in e(): " + err.message;
    }
  </script>
</body>
</html>
