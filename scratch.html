<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #fff; margin: 0; }
    .error { color: red; font-family: monospace; padding: 20px; z-index: 100; position: absolute; }
    #mojs-container { width: 100%; height: 100%; position: absolute; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mojs/core"></script>
</head>
<body>
  <div id="mojs-container"></div>
  <div id="result">Waiting...</div>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.getElementById('result').innerText = 'ERROR: ' + msg;
      return false;
    };

    try {
      const isMojsDefined = typeof mojs !== 'undefined';
      const isWindowMojsDefined = typeof window.mojs !== 'undefined';
      const hasMojsKey = 'mojs' in window;
      const typeOfWindowMojs = typeof window.mojs;
      
      let keys = [];
      for (let k in window) { if (k.toLowerCase().includes('mojs')) keys.push(k); }
      
      document.getElementById('result').innerText = `mojs: ${isMojsDefined}, window.mojs: ${isWindowMojsDefined} (${typeOfWindowMojs}), keys: ${keys.join(',')}`;
    } catch(e) {
      document.getElementById('result').innerText = 'ERROR: ' + e.message;
    }
  </script>
</body>
</html>
